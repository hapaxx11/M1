name: Static Analysis

# Runs cppcheck (with MISRA-C addon) on application source code.
# Triggered on PRs and pushes to main that touch C source files.
on:
  pull_request:
    branches: [main]
    paths:
      - 'm1_csrc/**'
      - 'Sub_Ghz/**'
      - 'Infrared/**'
      - 'lfrfid/**'
      - 'lib/**'
      - 'Battery/**'
      - 'Core/Src/**'
      - '.github/workflows/static-analysis.yml'
      - '.cppcheck-suppressions.txt'
  push:
    branches: [main]
    paths:
      - 'm1_csrc/**'
      - 'Sub_Ghz/**'
      - 'Infrared/**'
      - 'lfrfid/**'
      - 'lib/**'
      - 'Battery/**'
      - 'Core/Src/**'
      - '.github/workflows/static-analysis.yml'
      - '.cppcheck-suppressions.txt'

permissions:
  contents: read

jobs:
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cppcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cppcheck

      - name: Run cppcheck on application code
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppressions-list=.cppcheck-suppressions.txt \
            --inline-suppr \
            --std=c11 \
            --platform=unix32 \
            -DSTM32H573xx \
            -DUSE_HAL_DRIVER \
            -I m1_csrc \
            -I Sub_Ghz \
            -I Sub_Ghz/protocols \
            -I Infrared \
            -I lfrfid \
            -I Battery \
            -I Core/Inc \
            -I Drivers/STM32H5xx_HAL_Driver/Inc \
            -I Drivers/CMSIS/Device/ST/STM32H5xx/Include \
            -I Drivers/CMSIS/Include \
            -I NFC/Middlewares/ST/rfal/Inc \
            -I FatFs \
            -I lib/furi \
            m1_csrc/ \
            Sub_Ghz/protocols/ \
            2>&1 | tee cppcheck-report.txt

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.txt
          retention-days: 30

  cppcheck-misra:
    name: cppcheck MISRA-C advisory
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cppcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cppcheck python3

      - name: Create MISRA addon config
        run: |
          # Use the MISRA addon that ships with cppcheck.
          # We run in advisory mode (no --error-exitcode) so it reports but
          # does not fail the build — teams can ratchet this over time.
          ADDON_DIR=$(find /usr -path '*/cppcheck/addons/misra.py' -printf '%h' -quit 2>/dev/null || true)
          if [ -z "$ADDON_DIR" ]; then
            ADDON_DIR=$(find /usr -path '*/addons/misra.py' -printf '%h' -quit 2>/dev/null || true)
          fi
          echo "MISRA addon dir: ${ADDON_DIR:-not found}"

      - name: Run cppcheck with MISRA addon (advisory)
        continue-on-error: true
        run: |
          cppcheck \
            --addon=misra \
            --suppress=missingIncludeSystem \
            --suppressions-list=.cppcheck-suppressions.txt \
            --inline-suppr \
            --std=c11 \
            --platform=unix32 \
            -DSTM32H573xx \
            -DUSE_HAL_DRIVER \
            -I m1_csrc \
            -I Sub_Ghz \
            -I Sub_Ghz/protocols \
            -I Infrared \
            -I lfrfid \
            -I Battery \
            -I Battery \
            -I lfrfid \
            -I Core/Inc \
            -I Drivers/STM32H5xx_HAL_Driver/Inc \
            -I Drivers/CMSIS/Device/ST/STM32H5xx/Include \
            -I Drivers/CMSIS/Include \
            -I FatFs \
            -I lib/furi \
            -I NFC/Middlewares \
            -I NFC/Middlewares/ST \
            -I NFC/Middlewares/ST/rfal \
            -I NFC/Middlewares/ST/rfal/Inc \
            m1_csrc/ \
            2>&1 | tee misra-report.txt

      - name: Upload MISRA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: misra-report
          path: misra-report.txt
          retention-days: 30

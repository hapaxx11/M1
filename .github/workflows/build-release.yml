name: Build and Release

# Triggers:
#   1. Every push (merge) to main → automatic release with auto-incremented version.
#      Docs-only pushes (*.md, documentation/, LICENSE, IDE files) are skipped.
#   2. Manual dispatch from the Actions tab → optional tag/name overrides.
# Versions with MAJOR < 1 are automatically marked as pre-release.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'documentation/**'
      - 'ir_database/**'
      - 'subghz_database/**'
      - 'LICENSE'
      - 'COPYING.txt'
      - '.vscode/**'
      - '.settings/**'
      - '.project'
      - '.cproject'
      - '.mxproject'
      - 'subghz_playlist/**'
      - '.github/workflows/**'
      - '.github/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:
    inputs:
      tag:
        description: >
          Release tag (e.g. v0.9.0.5).
          Leave blank to auto-increment from the latest published release.
        required: false
        default: ''
      release_name:
        description: 'Human-readable release title (optional)'
        required: false
        default: ''
      prerelease:
        description: 'Force pre-release flag (versions < 1.0 are always pre-release)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write        # needed to create the release and upload assets
  pull-requests: write   # needed to open changelog update PRs
  issues: write          # needed to create the changelog-stamp label

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-24.04

    outputs:
      tag:              ${{ steps.meta.outputs.tag }}
      release_name:     ${{ steps.meta.outputs.release_name }}
      project_name:     ${{ steps.meta.outputs.project_name }}
      release_file_base: ${{ steps.meta.outputs.release_file_base }}
      is_prerelease:    ${{ steps.meta.outputs.is_prerelease }}

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout (with submodules)
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ------------------------------------------------------------------ #
      # 2. Auto-increment version — patch source files before building
      # ------------------------------------------------------------------ #
      # Queries the latest published release whose tag matches v{MAJOR}.{MINOR}.{BUILD}.*
      # and sets RC = (latest RC) + 1, so every CI run produces the next sequential
      # release automatically.  If a manual tag is supplied, its RC is used instead.
      # Only m1_fw_update_bl.h (FW_VERSION_RC, M1_HAPAX_REVISION) is patched.
      # CMakeLists.txt is NOT patched — it derives CMAKE_PROJECT_NAME automatically
      # from those same #define values at configure time.
      - name: Compute next version and patch source
        id: patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MAJOR=$(grep -m1 '#define[[:space:]]FW_VERSION_MAJOR' m1_csrc/m1_fw_update_bl.h \
                  | awk '{print $3}' | grep -Eo '^[0-9]+')
          MINOR=$(grep -m1 '#define[[:space:]]FW_VERSION_MINOR' m1_csrc/m1_fw_update_bl.h \
                  | awk '{print $3}' | grep -Eo '^[0-9]+')
          BUILD=$(grep -m1 '#define[[:space:]]FW_VERSION_BUILD' m1_csrc/m1_fw_update_bl.h \
                  | awk '{print $3}' | grep -Eo '^[0-9]+')

          if [ -n "${{ inputs.tag }}" ]; then
            # Use RC from the manually-supplied tag (e.g. v0.9.0.5 → 5)
            NEW_RC=$(echo "${{ inputs.tag }}" | grep -Eo '[0-9]+$')
            echo "Using manual tag RC: ${NEW_RC}"
          else
            # Auto-increment: find the highest RC already released for this prefix
            PREFIX="v${MAJOR}.${MINOR}.${BUILD}."
            LATEST_RC=$(gh release list \
                --repo "$GITHUB_REPOSITORY" \
                --limit 50 \
                --json tagName \
              | python3 -c "
          import json, sys
          prefix = '${PREFIX}'
          tags = [t['tagName'] for t in json.load(sys.stdin)]
          nums = []
          for t in tags:
              if t.startswith(prefix):
                  tail = t[len(prefix):]
                  if tail.isdigit():
                      nums.append(int(tail))
          print(max(nums) if nums else 0)
          " 2>/dev/null || echo "0")
            NEW_RC=$((LATEST_RC + 1))
            echo "Latest released RC: ${LATEST_RC} → next RC: ${NEW_RC}"

          fi

          echo "new_rc=${NEW_RC}" >> "$GITHUB_OUTPUT"

          # Patch FW_VERSION_RC in the header
          sed -i "s/^\(#define[[:space:]]FW_VERSION_RC[[:space:]]*\)[0-9]*/\1${NEW_RC}/" \
              m1_csrc/m1_fw_update_bl.h
          # Patch M1_HAPAX_REVISION in the header
          sed -i "s/^\(#define[[:space:]]M1_HAPAX_REVISION[[:space:]]*\)[0-9]*/\1${NEW_RC}/" \
              m1_csrc/m1_fw_update_bl.h
          echo "--- Patched values ---"
          grep -E 'FW_VERSION_RC|M1_HAPAX_REVISION' m1_csrc/m1_fw_update_bl.h

      # ------------------------------------------------------------------ #
      # 3. Read project metadata from source tree (after patching)
      # ------------------------------------------------------------------ #
      - name: Read build metadata
        id: meta
        run: |
          # Parse version from the header — single source of truth now that
          # CMAKE_PROJECT_NAME and M1_HAPAX_REVISION are derived at configure time.
          MAJOR=$(grep -m1 '#define[[:space:]]FW_VERSION_MAJOR' m1_csrc/m1_fw_update_bl.h \
                  | awk '{print $3}' | grep -Eo '^[0-9]+')
          MINOR=$(grep -m1 '#define[[:space:]]FW_VERSION_MINOR' m1_csrc/m1_fw_update_bl.h \
                  | awk '{print $3}' | grep -Eo '^[0-9]+')
          BUILD=$(grep -m1 '#define[[:space:]]FW_VERSION_BUILD' m1_csrc/m1_fw_update_bl.h \
                  | awk '{print $3}' | grep -Eo '^[0-9]+')
          RC=$(grep -m1 '#define[[:space:]]FW_VERSION_RC' m1_csrc/m1_fw_update_bl.h \
               | awk '{print $3}' | grep -Eo '^[0-9]+')
          HAPAX_REV=${RC}

          PROJECT="M1_Hapax_v${MAJOR}.${MINOR}.${BUILD}.${RC}"
          echo "project_name=${PROJECT}" >> "$GITHUB_OUTPUT"
          echo "hapax_rev=${HAPAX_REV}" >> "$GITHUB_OUTPUT"

          # Decide the release tag
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v${MAJOR}.${MINOR}.${BUILD}.${RC}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Decide the release title
          if [ -n "${{ inputs.release_name }}" ]; then
            RNAME="${{ inputs.release_name }}"
          else
            RNAME="M1 Hapax ${TAG}"
          fi
          echo "release_name=${RNAME}" >> "$GITHUB_OUTPUT"

          # Release file base name = project name (version is embedded in it, SiN360-style).
          # The wCRC image is ${PROJECT}_wCRC.bin, ELF/BIN/HEX are ${PROJECT}.{ext}.
          RFILE="${PROJECT}"
          echo "release_file_base=${RFILE}" >> "$GITHUB_OUTPUT"

          echo "--- Build metadata ---"
          echo "  Project:      ${PROJECT}"
          echo "  Hapax rev:    ${HAPAX_REV}"
          echo "  Base version: ${MAJOR}.${MINOR}.${BUILD}.${RC}"
          echo "  Tag:          ${TAG}"
          echo "  Release file: ${RFILE}_wCRC.bin"

          # Auto-detect pre-release: versions with MAJOR < 1 are always
          # pre-release.  Manual dispatch can also force it via the input.
          MANUAL_PRERELEASE="${{ inputs.prerelease }}"
          if [ "${MAJOR}" -lt 1 ]; then
            IS_PRERELEASE=true
          elif [ "${MANUAL_PRERELEASE}" = "true" ]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "  Pre-release:  ${IS_PRERELEASE}"

      # ------------------------------------------------------------------ #
      # 4. Install toolchain and build tools
      # ------------------------------------------------------------------ #
      - name: Install ARM toolchain and build tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            cmake \
            ninja-build \
            python3 \
            zip

      # ------------------------------------------------------------------ #
      # 5. Configure CMake
      # ------------------------------------------------------------------ #
      - name: Configure CMake
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # ------------------------------------------------------------------ #
      # 6. Build (CRC injection is a CMake POST_BUILD step)
      # ------------------------------------------------------------------ #
      - name: Build firmware
        run: |
          cmake --build build --parallel $(nproc)

      # ------------------------------------------------------------------ #
      # 7. Verify artifacts and print memory usage
      # ------------------------------------------------------------------ #
      - name: Verify artifacts
        id: verify
        run: |
          PROJECT="${{ steps.meta.outputs.project_name }}"

          ELF="build/${PROJECT}.elf"
          BIN="build/${PROJECT}.bin"
          HEX="build/${PROJECT}.hex"
          WCRC="build/${{ steps.meta.outputs.release_file_base }}_wCRC.bin"

          for f in "$ELF" "$BIN" "$HEX" "$WCRC"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: expected artifact missing: $f"
              exit 1
            fi
            echo "OK  $(du -h "$f" | cut -f1)   $f"
          done

          # Confirm it is valid ARM firmware.
          # STM32H573 is Cortex-M33 (ARMv8-M); the pattern also matches ARMv7-M
          # as a safety net if the ELF is somehow from a different build variant.
          ARCH=$(arm-none-eabi-objdump -f "$ELF" | grep architecture | head -1)
          echo "Architecture: ${ARCH}"
          if ! echo "$ARCH" | grep -qE "armv8-m|armv7-m"; then
            echo "ERROR: unexpected architecture"
            exit 1
          fi

          arm-none-eabi-size "$ELF"

      # ------------------------------------------------------------------ #
      # 8. Package SD card assets (IR + SubGHz databases)
      # ------------------------------------------------------------------ #
      - name: Package SD card assets
        run: |
          mkdir -p sd_staging/IR
          mkdir -p sd_staging/SubGHz/playlist

          # IR database: copy subdirectories and attribution files
          for d in ir_database/*/; do
            [ -d "$d" ] && cp -r "$d" sd_staging/IR/
          done
          [ -f ir_database/README.txt ] && \
            cp ir_database/README.txt sd_staging/IR/
          [ -f ir_database/SOURCES.md ] && \
            cp ir_database/SOURCES.md sd_staging/IR/

          # SubGHz signal database: copy subdirectories and include top-level notices
          for d in subghz_database/*/; do
            [ -d "$d" ] && cp -r "$d" sd_staging/SubGHz/
          done
          [ -f subghz_database/LICENSE ] && \
            cp subghz_database/LICENSE sd_staging/SubGHz/
          [ -f subghz_database/SOURCES.md ] && \
            cp subghz_database/SOURCES.md sd_staging/SubGHz/

          # SubGHz playlists: copy subdirectories, example file, and top-level notices
          for d in subghz_playlist/*/; do
            [ -d "$d" ] && cp -r "$d" sd_staging/SubGHz/playlist/
          done
          [ -f subghz_playlist/Example_Playlist.txt ] && \
            cp subghz_playlist/Example_Playlist.txt sd_staging/SubGHz/playlist/
          [ -f subghz_playlist/LICENSE ] && \
            cp subghz_playlist/LICENSE sd_staging/SubGHz/playlist/
          [ -f subghz_playlist/SOURCES.md ] && \
            cp subghz_playlist/SOURCES.md sd_staging/SubGHz/playlist/

          echo "--- SD card asset tree ---"
          find sd_staging -type f | sort | head -40
          echo "Total files: $(find sd_staging -type f | wc -l)"

          cd sd_staging
          zip -r ../SD_Assets.zip .
          cd ..
          echo "SD_Assets.zip size: $(du -h SD_Assets.zip | cut -f1)"

      # ------------------------------------------------------------------ #
      # 9. Upload artifacts for the release job
      # ------------------------------------------------------------------ #
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.meta.outputs.tag }}
          path: |
            build/${{ steps.meta.outputs.project_name }}.elf
            build/${{ steps.meta.outputs.project_name }}.hex
            build/${{ steps.meta.outputs.project_name }}.bin
            build/${{ steps.meta.outputs.release_file_base }}_wCRC.bin
          if-no-files-found: error
          retention-days: 90

      - name: Upload SD card assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: sd-assets-${{ steps.meta.outputs.tag }}
          path: SD_Assets.zip
          if-no-files-found: error
          retention-days: 90

  # ====================================================================== #
  # Publish GitHub Release
  # ====================================================================== #
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ needs.build.outputs.tag }}
          path: artifacts/

      - name: Download SD card assets artifact
        uses: actions/download-artifact@v4
        with:
          name: sd-assets-${{ needs.build.outputs.tag }}
          path: artifacts/

      - name: List release assets
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ needs.build.outputs.tag }}
          name:       ${{ needs.build.outputs.release_name }}
          prerelease: ${{ needs.build.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            artifacts/${{ needs.build.outputs.project_name }}.elf
            artifacts/${{ needs.build.outputs.project_name }}.hex
            artifacts/${{ needs.build.outputs.project_name }}.bin
            artifacts/${{ needs.build.outputs.release_file_base }}_wCRC.bin
            artifacts/SD_Assets.zip
          body: |
            ## M1 Hapax ${{ needs.build.outputs.tag }}

            | File | Description |
            |------|-------------|
            | `${{ needs.build.outputs.release_file_base }}_wCRC.bin` | **SD-card / OTA update image** (CRC + Hapax metadata injected) |
            | `SD_Assets.zip` | **SD card databases** — IR remotes (1,412 files) + Sub-GHz signals (313 files) + playlists |
            | `${{ needs.build.outputs.project_name }}.bin`         | Raw binary (no CRC — for direct flashing / reference) |
            | `${{ needs.build.outputs.project_name }}.hex`         | Intel HEX (ST-Link / OpenOCD) |
            | `${{ needs.build.outputs.project_name }}.elf`         | ELF with debug symbols |

            > **Flash via SD card:** copy `*_wCRC.bin` to the root of the SD card and use the M1 firmware update menu.
            >
            > **First-time setup:** extract `SD_Assets.zip` to the root of the SD card.
            > This places `IR/` and `SubGHz/` directories with all bundled remote and signal files.
            > The IR database powers **Infrared → Universal Remote** and **Infrared → Saved**.
            > The Sub-GHz database powers **Sub-GHz → Saved** and **Sub-GHz → Playlist**.

  # ====================================================================== #
  # Stamp CHANGELOG.md — replace [Unreleased] with the release version
  # ====================================================================== #
  update-changelog:
    name: Stamp changelog
    needs: [build, release]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Assemble changelog fragments
        run: |
          echo "=== Assembling changelog fragments ==="
          FRAGMENT_COUNT=$(find .changelog -maxdepth 1 -name '*.md' ! -iname 'README.md' 2>/dev/null | wc -l)
          if [ "$FRAGMENT_COUNT" -gt 0 ]; then
            python3 scripts/assemble_changelog.py
          else
            echo "No changelog fragments found — skipping assembly."
          fi

      - name: Replace [Unreleased] with version heading
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          DATE="$(date -u +%Y-%m-%d)"
          echo "Stamping CHANGELOG.md: [Unreleased] → [${VERSION}] - ${DATE}"

          python3 - "$VERSION" "$DATE" <<'PYEOF'
          import sys, pathlib

          version, date = sys.argv[1], sys.argv[2]
          cl = pathlib.Path("CHANGELOG.md")
          text = cl.read_text()

          old = "## [Unreleased]"
          if old not in text:
              print("No [Unreleased] section found — nothing to do.")
              sys.exit(0)

          new = f"## [Unreleased]\n\n## [{version}] - {date}"
          text = text.replace(old, new, 1)
          cl.write_text(text)
          print(f"Replaced with: ## [{version}] - {date}")
          PYEOF

          echo "--- First 15 lines of CHANGELOG.md ---"
          head -15 CHANGELOG.md

      - name: Commit, open PR, and auto-merge changelog update
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          BRANCH="changelog/stamp-${TAG}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Delete any stale changelog stamp branches from previous releases
          STALE=$(git ls-remote --heads origin 'changelog/stamp-*' \
                  | awk '{print $2}' | sed 's|refs/heads/||')
          for branch in ${STALE}; do
            echo "Deleting stale branch: ${branch}"
            git push origin --delete "${branch}" || true
          done

          git checkout -b "${BRANCH}"
          git add CHANGELOG.md
          # Also stage deletion of assembled fragment files
          if [ -d .changelog ]; then
            git add .changelog/
          fi
          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
            exit 0
          fi
          git commit -m "changelog: stamp [Unreleased] as ${TAG} [skip ci]"
          git push origin "${BRANCH}"

          # Ensure the changelog-stamp label exists (excluded from auto-generated release notes via .github/release.yml)
          gh label create changelog-stamp --description "Automated changelog stamp PR" --color "ededed" 2>/dev/null || true

          # Create the PR with the changelog-stamp label so it is excluded from release notes
          PR_URL=$(gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "changelog: stamp [Unreleased] as ${TAG}" \
            --label "changelog-stamp" \
            --body "Automated changelog update from release workflow for \`${TAG}\`.") \
            || true

          if [ -z "${PR_URL}" ]; then
            echo "::warning::Failed to create changelog PR for ${TAG}"
            exit 0
          fi
          echo "Created PR: ${PR_URL}"

          # Try to merge immediately, then fall back to auto-merge
          if ! gh pr merge "${BRANCH}" --squash --delete-branch; then
            echo "Immediate merge not possible — enabling auto-merge"
            gh pr merge "${BRANCH}" --squash --delete-branch --auto \
              || echo "::warning::Could not merge or enable auto-merge — PR remains open for manual review"
          fi

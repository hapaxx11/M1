name: CI Build Check

# Runs on every PR targeting main and on direct pushes to main,
# except for docs-only and non-compilation changes (see paths-ignore).
# GitHub branch-protection rules can require this job ("build") to pass
# before a PR is mergeable.
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'documentation/**'
      - 'ir_database/**'
      - 'subghz_database/**'
      - 'LICENSE'
      - 'COPYING.txt'
      - '.vscode/**'
      - '.settings/**'
      - '.project'
      - '.cproject'
      - '.mxproject'
      - 'subghz_playlist/**'
      - '.github/workflows/**'
      - '.github/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'documentation/**'
      - 'ir_database/**'
      - 'subghz_database/**'
      - 'LICENSE'
      - 'COPYING.txt'
      - '.vscode/**'
      - '.settings/**'
      - '.project'
      - '.cproject'
      - '.mxproject'
      - 'subghz_playlist/**'
      - '.github/workflows/**'
      - '.github/*.md'
      - '.github/ISSUE_TEMPLATE/**'

permissions:
  contents: read

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-24.04

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout (with submodules)
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ------------------------------------------------------------------ #
      # 2. Install toolchain and build tools
      # ------------------------------------------------------------------ #
      - name: Install ARM toolchain and build tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            cmake \
            ninja-build \
            python3

      # ------------------------------------------------------------------ #
      # 3. Configure CMake
      # ------------------------------------------------------------------ #
      - name: Configure CMake
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # ------------------------------------------------------------------ #
      # 4. Build firmware
      # ------------------------------------------------------------------ #
      - name: Build firmware
        run: |
          cmake --build build --parallel $(nproc)

      # ------------------------------------------------------------------ #
      # 5. Verify artifacts and print memory usage
      # ------------------------------------------------------------------ #
      - name: Verify build artifacts
        run: |
          # Derive project name from the header (same logic as CMakeLists.txt)
          MAJOR=$(grep -m1 '#define[[:space:]]FW_VERSION_MAJOR' m1_csrc/m1_fw_update_bl.h \
                  | awk '{print $3}' | grep -Eo '^[0-9]+')
          MINOR=$(grep -m1 '#define[[:space:]]FW_VERSION_MINOR' m1_csrc/m1_fw_update_bl.h \
                  | awk '{print $3}' | grep -Eo '^[0-9]+')
          BUILD=$(grep -m1 '#define[[:space:]]FW_VERSION_BUILD' m1_csrc/m1_fw_update_bl.h \
                  | awk '{print $3}' | grep -Eo '^[0-9]+')
          RC=$(grep -m1 '#define[[:space:]]FW_VERSION_RC' m1_csrc/m1_fw_update_bl.h \
               | awk '{print $3}' | grep -Eo '^[0-9]+')

          PROJECT="M1_Hapax_v${MAJOR}.${MINOR}.${BUILD}.${RC}"

          ELF="build/${PROJECT}.elf"
          BIN="build/${PROJECT}.bin"
          HEX="build/${PROJECT}.hex"

          for f in "$ELF" "$BIN" "$HEX"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: expected artifact missing: $f"
              exit 1
            fi
            echo "OK  $(du -h "$f" | cut -f1)   $f"
          done

          # Confirm it is valid ARM firmware
          ARCH=$(arm-none-eabi-objdump -f "$ELF" | grep architecture | head -1)
          echo "Architecture: ${ARCH}"
          if ! echo "$ARCH" | grep -qE "armv8-m|armv7-m"; then
            echo "ERROR: unexpected architecture"
            exit 1
          fi

          arm-none-eabi-size "$ELF"

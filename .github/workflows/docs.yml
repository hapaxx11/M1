name: Documentation & Web Updater

# Generates Doxygen API documentation and deploys it along with the
# web updater to GitHub Pages.
# Runs on pushes to main that touch source files, docs config, or web updater.
on:
  push:
    branches: [main]
    paths:
      - 'm1_csrc/**'
      - 'Sub_Ghz/**'
      - 'Infrared/**'
      - 'lfrfid/**'
      - 'Battery/**'
      - 'Core/Inc/**'
      - 'lib/**'
      - 'Doxyfile'
      - 'web-updater/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build site
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update -y
          sudo apt-get install -y doxygen

      - name: Generate documentation
        run: doxygen Doxyfile

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          # Web updater at root (update/)
          cp -r web-updater/* _site/
          # Doxygen docs at /docs/
          cp -r docs/html _site/docs

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
